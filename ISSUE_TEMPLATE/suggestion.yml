name: "💡 Suggestion de fonctionnalité"
description: Proposez une idée pour le bot avec un vrai formulaire !
title: "[Suggestion]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de proposer une idée pour améliorer le bot ! Soyez le plus précis possible.
  
  - type: dropdown
    id: category
    attributes:
      label: Quel est le domaine de la suggestion ?
      options:
        - 🛡️ Modération
        - 🎮 Amusement / Jeux
        - ⚙️ Utilitaire
        - 💎 Autre
    validations:
      required: true

  - type: input
    id: command_name
    attributes:
      label: Nom de la commande ou fonctionnalité
      placeholder: "Ex: /pile-ou-face ou Système de niveaux"
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Quel est l'objectif ?
      description: À quoi cela sert-il ? Pourquoi est-ce utile ?
      placeholder: "Expliquez en quoi cela aide le serveur..."
    validations:
      required: true

  - type: textarea
    id: detailed_function
    attributes:
      label: Fonctionnement détaillé
      description: Expliquez étape par étape comment la fonction devrait réagir.
      placeholder: "Ex: Quand l'utilisateur fait ça, le bot répond ça..."
    validations:
      required: true

  - type: checkboxes
    id: permissions
    attributes:
      label: Qui pourra utiliser cette fonction ?
      options:
        - label: Accessible à tous
        - label: Staff uniquement (Modos/Admins)
